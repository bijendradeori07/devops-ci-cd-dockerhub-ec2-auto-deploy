name: Full CI/CD Pipeline

on:
  push:
     branches:
       - main

jobs:
  docker:
     runs-on: ubuntu-latest

     steps:
       - name: Checkout source code
         uses: actions/checkout@v4

       - name: Set up Docker Buildx
         uses: docker/setup-buildx-action@v3

       - name: Login to Docker Hub
         uses: docker/login-action@v3
         with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

       - name: Build and Push Image
         uses: docker/build-push-action@v6
         with:
            context: .
            push: true
            tags:  |
              ${{ secrets.DOCKERHUB_USERNAME }}/dockerhub-image-registry-github-actions:latest
              ${{ secrets.DOCKERHUB_USERNAME }}/dockerhub-image-registry-github-actions:v1              
       - name: Deploy to EC2 via SSH
         uses: appleboy/ssh-action@v0.1.10
         with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script:  |
              sudo docker pull bijendradeori07/dockerhub-image-registry-github-actions:latest
              
              sudo docker stop app || true
              sudo docker rm app || true
              
              sudo docker run -d --name app -p 80:80 bijendradeori07/dockerhub-image-registry-github-actions:latest
